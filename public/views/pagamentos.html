<!-- pagamentos.html — refatorado -->
<style>
/* Herda do erp-design-system.css — badges específicos deste módulo */
.badge-tipo-pos_debito  { background: #dbeafe; color: #1e40af; }
.badge-tipo-pos_credito { background: #fce7f3; color: #9d174d; }
.badge-tipo-pos_pix     { background: #d1fae5; color: #065f46; }
</style>

<div class="erp-page">

  <!-- Cabeçalho da página -->
  <div class="erp-header">
    <div class="erp-header-left">
      <h1 class="erp-page-title">
        <i class="bi bi-credit-card-2-front"></i>
        Pagamentos
      </h1>
      <button data-submit class="btn-reload" title="Recarregar tabela">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="erp-header-actions">
      <button data-create class="btn-erp btn-erp-primary">
        <i class="bi bi-plus-lg"></i> Cadastrar Pagamento
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="erp-filters">
    <div class="erp-filters-header">
      <i class="bi bi-funnel"></i> Filtros
    </div>
    <div class="erp-filters-grid">
      <div>
        <label class="erp-label" for="filtro_pgt_tipo">Tipo de pagamento</label>
        <select class="erp-select" id="filtro_pgt_tipo">
          <option value="">Todos</option>
          <option value="pix">PIX</option>
          <option value="convenio">Convênio</option>
          <option value="pos_debito">POS Débito</option>
          <option value="pos_credito">POS Crédito</option>
          <option value="pos_pix">POS PIX</option>
          <option value="dinheiro">Dinheiro</option>
          <option value="outros">Outros</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_pgt_status">Status</label>
        <select class="erp-select" id="filtro_pgt_status">
          <option value="">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="confirmado">Confirmado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_pgt_di">Data início</label>
        <input type="date" class="erp-input" id="filtro_pgt_di">
      </div>
      <div>
        <label class="erp-label" for="filtro_pgt_df">Data fim</label>
        <input type="date" class="erp-input" id="filtro_pgt_df">
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="erp-table-wrapper">
    <table id="tabela-pagamentos" class="erp-table display" style="width:100%">
      <thead>
        <tr>
          <th>Venda</th>
          <th>Tipo</th>
          <th>Valor</th>
          <th>Referência</th>
          <th>Descrição</th>
          <th>Status</th>
          <th>Data</th>
          <th class="no-export">Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
