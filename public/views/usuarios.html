<!-- usuarios.html — refatorado -->
<!-- ATENÇÃO: o onclick inline do botão Criar foi movido para usuarios.js (document.querySelector('[data-create]')) -->

<div class="erp-page">

  <!-- Cabeçalho -->
  <div class="erp-header">
    <div class="erp-header-left">
      <h1 class="erp-page-title">
        <i class="bi bi-people"></i>
        Usuários
      </h1>
      <button data-submit class="btn-reload" title="Recarregar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="erp-header-actions">
      <button data-create class="btn-erp btn-erp-primary">
        <i class="bi bi-person-plus"></i> Criar Usuário
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="erp-filters">
    <div class="erp-filters-header">
      <i class="bi bi-funnel"></i> Filtros
    </div>
    <div class="erp-filters-grid">
      <div>
        <label class="erp-label" for="filtro_perfil">Perfil</label>
        <select class="erp-select" id="filtro_perfil">
          <option value="">Todos</option>
          <option value="operador">Operador</option>
          <option value="gerente">Gerente</option>
          <option value="administrador">Administrador</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_status">Status</label>
        <select class="erp-select" id="filtro_status">
          <option value="">Todos</option>
          <option value="ativado">Ativados</option>
          <option value="desativado">Desativados</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="erp-table-wrapper">
    <table id="tabela" class="erp-table display" style="width:100%">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Login</th>
          <th>CPF</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th>Perfil</th>
          <th>Status</th>
          <th>Criado em</th>
          <th>Último login</th>
          <th class="no-export">Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
