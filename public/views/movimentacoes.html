<!-- movimentacoes.html — refatorado -->

<div class="erp-page">

  <!-- Cabeçalho -->
  <div class="erp-header">
    <div class="erp-header-left">
      <h1 class="erp-page-title">
        <i class="bi bi-journal-text"></i>
        Movimentações de Estoque
      </h1>
      <button data-submit class="btn-reload" title="Recarregar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="erp-filters">
    <div class="erp-filters-header">
      <i class="bi bi-funnel"></i> Filtros
    </div>
    <div class="erp-filters-grid">
      <div style="grid-column: span 2;">
        <label class="erp-label" for="filtro_mov_produto">Produto</label>
        <select class="erp-select" id="filtro_mov_produto">
          <option value="">Todos os produtos</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_tipo">Tipo</label>
        <select class="erp-select" id="filtro_mov_tipo">
          <option value="">Todos</option>
          <option value="ENTRADA">ENTRADA</option>
          <option value="SAIDA">SAÍDA</option>
          <option value="AJUSTE">AJUSTE</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_embalagem">Embalagem</label>
        <select class="erp-select" id="filtro_mov_embalagem">
          <option value="">Todas</option>
          <option value="UN">UN — Unidade</option>
          <option value="CX">CX — Caixa</option>
          <option value="KG">KG — Quilograma</option>
          <option value="G">G — Grama</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_origem">Origem</label>
        <select class="erp-select" id="filtro_mov_origem">
          <option value="">Todas</option>
          <option value="VENDA">VENDA</option>
          <option value="COMPRA">COMPRA</option>
          <option value="AJUSTE">AJUSTE</option>
          <option value="DEVOLUCAO">DEVOLUÇÃO</option>
          <option value="ESTORNO">ESTORNO</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_data_inicio">Data início</label>
        <input type="date" class="erp-input" id="filtro_mov_data_inicio">
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_data_fim">Data fim</label>
        <input type="date" class="erp-input" id="filtro_mov_data_fim">
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_qty_op">Qtd.</label>
        <select class="erp-select" id="filtro_mov_qty_op">
          <option value="">Qualquer</option>
          <option value="gt">Maior que</option>
          <option value="lt">Menor que</option>
          <option value="eq">Igual a</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_mov_qty_val">&nbsp;</label>
        <input type="number" class="erp-input" id="filtro_mov_qty_val" placeholder="Valor" min="0" step="0.001">
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="erp-table-wrapper">
    <table id="tabela-movimentacoes" class="erp-table display" style="width:100%">
      <thead>
        <tr>
          <th>Produto</th>
          <th>Tipo</th>
          <th>Quantidade</th>
          <th>Embalagem</th>
          <th>Cód. Barras</th>
          <th>Motivo</th>
          <th>Origem</th>
          <th>Operador</th>
          <th>Data/Hora</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
