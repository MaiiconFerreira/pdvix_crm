<style>
  #pdv-wrapper { min-height: 80vh; }
  .pdv-col-cart { background: #fff; border-right: 2px solid #e9ecef; }
  .pdv-col-right { background: #f8f9fa; }
  .cart-table td, .cart-table th { font-size: 13px; vertical-align: middle; }
  .cart-table .btn-remove { padding: 2px 6px; }
  .pdv-total-row { font-size: 1.1rem; }
  .pdv-grand-total { font-size: 1.5rem; color: #198754; font-weight: bold; }
  .pdv-section-title {
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: .05em; color: #6c757d;
    border-bottom: 1px solid #dee2e6; padding-bottom: 4px; margin-bottom: 12px;
  }
  .payment-item {
    display: flex; justify-content: space-between; align-items: center;
    background: #e9f7ef; border: 1px solid #c3e6cb;
    border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; font-size: 13px;
  }
  .payment-item .btn-remove-pgt { padding: 0 4px; line-height: 1; }
  #troco-box { font-size: 1.1rem; }
  #troco-box.negativo { color: #dc3545; }
  #troco-box.positivo { color: #198754; }
  .btn-finalizar-venda {
    background: #198754; color: #fff; font-size: 1rem;
    border-radius: 8px; padding: 10px;
  }
  .btn-finalizar-venda:hover { background: #157347; color: #fff; }
  .btn-limpar-pdv { font-size: 0.85rem; }
</style>

<div class="container-fluid p-0" id="pdv-wrapper">
  <div class="row g-0 h-100">

    <!-- ═══ COLUNA ESQUERDA: CARRINHO ═══ -->
    <div class="col-lg-7 pdv-col-cart p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0"><i class="bi bi-cart3"></i> Carrinho</h5>
        <button class="btn btn-outline-danger btn-sm btn-limpar-pdv" id="btn-limpar-carrinho">
          <i class="bi bi-trash"></i> Limpar
        </button>
      </div>

      <div class="table-responsive" style="max-height: 55vh; overflow-y: auto;">
        <table class="table table-sm table-hover cart-table" id="tabela-carrinho">
          <thead class="table-light sticky-top">
            <tr>
              <th>Produto</th>
              <th style="width:70px">Qtd</th>
              <th style="width:100px">Unitário</th>
              <th style="width:100px">Subtotal</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="tbody-carrinho">
            <tr id="cart-empty-row">
              <td colspan="5" class="text-center text-muted py-4">
                <i class="bi bi-cart-x" style="font-size:2rem;"></i><br>Carrinho vazio
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Totais do carrinho -->
      <div class="mt-3 px-1">
        <div class="d-flex justify-content-between pdv-total-row mb-1">
          <span>Subtotal</span>
          <span id="pdv-subtotal">R$ 0,00</span>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-1">
          <span>Desconto (R$)</span>
          <input type="number" id="pdv-desconto" class="form-control form-control-sm text-end"
            style="max-width:120px" min="0" step="0.01" value="0">
        </div>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <span>Acréscimo (R$)</span>
          <input type="number" id="pdv-acrescimo" class="form-control form-control-sm text-end"
            style="max-width:120px" min="0" step="0.01" value="0">
        </div>
        <div class="d-flex justify-content-between pdv-grand-total border-top pt-2">
          <span>TOTAL</span>
          <span id="pdv-total">R$ 0,00</span>
        </div>
      </div>
    </div>

    <!-- ═══ COLUNA DIREITA: BUSCA + PAGAMENTO ═══ -->
    <div class="col-lg-5 pdv-col-right p-4 d-flex flex-column gap-3">

      <!-- Busca de produto -->
      <div>
        <div class="pdv-section-title">Adicionar produto</div>
        <div class="mb-2">
          <select class="form-control" id="pdv-busca-produto" placeholder="Nome ou código de barras..."></select>
        </div>
        <div class="row g-2">
          <div class="col-4">
            <label class="small">Quantidade</label>
            <input type="number" id="pdv-add-qtd" class="form-control" min="1" value="1">
          </div>
          <div class="col-4">
            <label class="small">Preço (R$)</label>
            <input type="number" id="pdv-add-preco" class="form-control" min="0" step="0.01">
          </div>
          <div class="col-4 d-flex align-items-end">
            <button class="btn btn-primary w-100" id="btn-add-ao-carrinho">
              <i class="bi bi-plus-lg"></i> Add
            </button>
          </div>
        </div>
      </div>

      <!-- Seção de pagamentos -->
      <div class="flex-grow-1">
        <div class="pdv-section-title">Pagamentos</div>

        <div class="row g-2 mb-2">
          <div class="col-6">
            <select class="form-control" id="pdv-tipo-pagamento">
              <option value="">Tipo...</option>
              <option value="dinheiro">Dinheiro</option>
              <option value="pix">PIX</option>
              <option value="pos_debito">POS Débito</option>
              <option value="pos_credito">POS Crédito</option>
              <option value="pos_pix">POS PIX</option>
              <option value="convenio">Convênio</option>
              <option value="outros">Outros</option>
            </select>
          </div>
          <div class="col-4">
            <input type="number" id="pdv-valor-pgt" class="form-control"
              placeholder="Valor" min="0" step="0.01">
          </div>
          <div class="col-2">
            <button class="btn btn-outline-success w-100" id="btn-add-pagamento" title="Adicionar pagamento">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>
        </div>

        <!-- Lista de pagamentos adicionados -->
        <div id="lista-pagamentos-pdv"></div>

        <!-- Troco -->
        <div class="mt-2 p-2 bg-white rounded border">
          <div class="d-flex justify-content-between">
            <span class="text-muted small">Total pago:</span>
            <span id="pdv-total-pago" class="fw-bold">R$ 0,00</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted small">Troco / Saldo:</span>
            <span id="troco-box" class="fw-bold">R$ 0,00</span>
          </div>
        </div>
      </div>

      <!-- Botão finalizar -->
      <button class="btn btn-finalizar-venda w-100" id="btn-finalizar-venda">
        <i class="bi bi-check-circle-fill me-1"></i> Finalizar Venda
      </button>
    </div>

  </div>
</div>
