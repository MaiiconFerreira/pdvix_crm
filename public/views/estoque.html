<!-- estoque.html — refatorado -->

<div class="erp-page">

  <!-- Cabeçalho -->
  <div class="erp-header">
    <div class="erp-header-left">
      <h1 class="erp-page-title">
        <i class="bi bi-boxes"></i>
        Estoque
      </h1>
      <button data-submit class="btn-reload" title="Recarregar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="erp-header-actions">
      <button data-movimentar class="btn-erp btn-erp-primary">
        <i class="bi bi-arrow-left-right"></i> Movimentar
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="erp-filters">
    <div class="erp-filters-header">
      <i class="bi bi-funnel"></i> Filtros
    </div>
    <div class="erp-filters-grid">
      <div>
        <label class="erp-label" for="filtro_est_status">Status</label>
        <select class="erp-select" id="filtro_est_status">
          <option value="">Todos</option>
          <option value="0">Ativo</option>
          <option value="1">Bloqueado</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_est_unidade_base">Tipo produto</label>
        <select class="erp-select" id="filtro_est_unidade_base">
          <option value="">Todos</option>
          <option value="UN">UN — Unidades</option>
          <option value="G">G — Peso</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_est_embalagem">Embalagem</label>
        <select class="erp-select" id="filtro_est_embalagem">
          <option value="">Todas</option>
          <option value="UN">UN — Unidade</option>
          <option value="CX">CX — Caixa</option>
          <option value="KG">KG — Quilo</option>
          <option value="G">G — Grama</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_qty_op">Quantidade</label>
        <select class="erp-select" id="filtro_qty_op">
          <option value="">Qualquer</option>
          <option value="gt">Maior que</option>
          <option value="lt">Menor que</option>
          <option value="eq">Igual a</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_qty_val">&nbsp;</label>
        <input type="number" class="erp-input" id="filtro_qty_val" placeholder="Valor" min="0">
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="erp-table-wrapper">
    <table id="tabela-estoque" class="erp-table display" style="width:100%">
      <thead>
        <tr>
          <th>Produto</th>
          <th>Fat. Embalagem</th>
          <th>Unidade</th>
          <th>Códigos de Barras</th>
          <th>Qtd. em Estoque</th>
          <th>Última Movim.</th>
          <th>Atualizado em</th>
          <th>Status</th>
          <th class="no-export">Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
