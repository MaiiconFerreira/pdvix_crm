<!-- vendas.html — refatorado -->

<div class="erp-page">

  <!-- Cabeçalho -->
  <div class="erp-header">
    <div class="erp-header-left">
      <h1 class="erp-page-title">
        <i class="bi bi-cart3"></i>
        Vendas
      </h1>
      <button data-submit class="btn-reload" title="Recarregar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="erp-header-actions">
      <button data-create class="btn-erp btn-erp-primary">
        <i class="bi bi-plus-lg"></i> Nova Venda
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="erp-filters">
    <div class="erp-filters-header">
      <i class="bi bi-funnel"></i> Filtros
    </div>
    <div class="erp-filters-grid">
      <div>
        <label class="erp-label" for="filtro_venda_status">Status</label>
        <select class="erp-select" id="filtro_venda_status">
          <option value="">Todos</option>
          <option value="aberta">Aberta</option>
          <option value="finalizada">Finalizada</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_venda_di">Data início</label>
        <input type="date" class="erp-input" id="filtro_venda_di">
      </div>
      <div>
        <label class="erp-label" for="filtro_venda_df">Data fim</label>
        <input type="date" class="erp-input" id="filtro_venda_df">
      </div>
      <div>
        <label class="erp-label" for="filtro_venda_total_op">Total</label>
        <select class="erp-select" id="filtro_venda_total_op">
          <option value="">Qualquer</option>
          <option value="gt">Maior que</option>
          <option value="lt">Menor que</option>
          <option value="eq">Igual a</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_venda_total_val">&nbsp;</label>
        <input type="number" class="erp-input" id="filtro_venda_total_val" placeholder="Valor" min="0">
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="erp-table-wrapper">
    <table id="tabela-vendas" class="erp-table display" style="width:100%">
      <thead>
        <tr>
          <th>Nº Venda</th>
          <th>Data</th>
          <th>Usuário</th>
          <th>Subtotal</th>
          <th>Desconto</th>
          <th>Acréscimo</th>
          <th>Total</th>
          <th>Status</th>
          <th class="no-export">Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
