<!-- produtos.html — refatorado -->
<style>
.badge-unidade-peso { background: #fef9c3; color: #92400e; }
.badge-unidade-un   { background: var(--c-bg, #f8fafc); color: var(--c-text-2, #475569); border: 1px solid var(--c-border, #e2e8f0); }
</style>

<div class="erp-page">

  <!-- Cabeçalho -->
  <div class="erp-header">
    <div class="erp-header-left">
      <h1 class="erp-page-title">
        <i class="bi bi-box-seam"></i>
        Produtos
      </h1>
      <button data-submit class="btn-reload" title="Recarregar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
    <div class="erp-header-actions">
      <button data-create class="btn-erp btn-erp-primary">
        <i class="bi bi-plus-lg"></i> Criar Produto
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="erp-filters">
    <div class="erp-filters-header">
      <i class="bi bi-funnel"></i> Filtros
    </div>
    <div class="erp-filters-grid">
      <div>
        <label class="erp-label" for="filtro_status_produto">Status</label>
        <select class="erp-select" id="filtro_status_produto">
          <option value="">Todos</option>
          <option value="0">Ativo</option>
          <option value="1">Bloqueado</option>
        </select>
      </div>
      <div>
        <label class="erp-label" for="filtro_unidade_base">Tipo de produto</label>
        <select class="erp-select" id="filtro_unidade_base">
          <option value="">Todos</option>
          <option value="UN">UN — Unidades</option>
          <option value="G">G — Peso (balança)</option>
        </select>
      </div>
      <div style="grid-column: span 2;">
        <label class="erp-label" for="filtro_fornecedor">Fornecedor</label>
        <select class="erp-select" id="filtro_fornecedor">
          <option value="">Todos os fornecedores</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Tabela -->
  <div class="erp-table-wrapper">
    <table id="tabela-produtos" class="erp-table display" style="width:100%">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Cód. Interno</th>
          <th>Preço Venda</th>
          <th>Custo</th>
          <th>Fat. Embalagem</th>
          <th>Unidade</th>
          <th>Fornecedor</th>
          <th>Status</th>
          <th>Última Alteração</th>
          <th>Qtd. Estoque</th>
          <th class="no-export">Ações</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>
